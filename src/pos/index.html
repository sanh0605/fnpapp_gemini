<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Bán hàng</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
    .status-bar{background:#fff;padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .status-left{display:flex;align-items:center;gap:8px}
    .status-title{font-size:13px;font-weight:600;color:#1a1a18}
    .user-name{font-size:12px;color:#888;background:#f5f5f0;padding:3px 8px;border-radius:20px}
    .status-right{display:flex;align-items:center;gap:8px}
    .net-indicator{display:flex;align-items:center;gap:5px;font-size:12px}
    .net-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;transition:background .4s}
    .net-dot.offline{background:#E24B4A}
    .net-label{color:#888}
    .order-badge{font-size:12px;font-weight:500;color:#888;background:#f5f5f0;padding:3px 8px;border-radius:20px}
    .logout-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;transition:all .15s;flex-shrink:0}
    .logout-btn:active{background:#FCEBEB;border-color:#F09595;color:#A32D2D}
    .cat-bar{background:#fff;padding:10px 14px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .cat-bar::-webkit-scrollbar{display:none}
    .cat-pill{padding:6px 16px;border-radius:20px;border:0.5px solid #d8d6d0;background:transparent;color:#888;font-size:13px;white-space:nowrap;cursor:pointer;transition:all .15s;font-family:inherit}
    .cat-pill.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
    .menu-list{flex:1;overflow-y:auto;padding:10px 14px 90px;display:flex;flex-direction:column;gap:7px}
    .menu-row{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:11px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:background .12s;user-select:none}
    .menu-row:active{background:#f5f5f0}
    .menu-row.out{opacity:.4;pointer-events:none}
    .micon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .minfo{flex:1;min-width:0}
    .mname{font-size:14px;font-weight:500;color:#1a1a18}
    .mprice{font-size:13px;color:#888;margin-top:2px}
    .mtag{font-size:11px;margin-top:2px}
    .mtag.low{color:#BA7517}
    .mtag.out{color:#E24B4A}
    .add-btn{width:36px;height:36px;border-radius:50%;background:#E1F5EE;border:none;color:#0F6E56;font-size:24px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1;font-family:inherit;transition:background .12s}
    .add-btn:active{background:#9FE1CB}
    .qty-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .qb{width:30px;height:30px;border-radius:50%;border:0.5px solid #d8d6d0;background:#f5f5f0;color:#1a1a18;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background .12s}
    .qb:active{background:#e8e6e0}
    .qn{font-size:14px;font-weight:500;min-width:18px;text-align:center;color:#1a1a18}
    .bottom-cart{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;border-top:0.5px solid #d8d6d0;transition:height .32s cubic-bezier(.4,0,.2,1);height:74px;overflow:hidden;display:flex;flex-direction:column;z-index:100}
    .bottom-cart.expanded{height:min(580px,78dvh)}
    .handle{width:36px;height:4px;background:#d8d6d0;border-radius:2px;position:absolute;top:10px;left:50%;transform:translateX(-50%)}
    .cart-collapsed{padding:0 16px;height:74px;flex-shrink:0;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
    .cart-summary{flex:1}
    .cart-lbl{font-size:11px;color:#888}
    .cart-total-big{font-size:20px;font-weight:600;color:#1a1a18;display:flex;align-items:center;gap:8px}
    .count-badge{background:#E24B4A;color:#fff;font-size:11px;font-weight:600;border-radius:10px;padding:1px 7px}
    .cart-toggle-btn{background:#1D9E75;color:#fff;border:none;border-radius:16px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;min-width:44px;min-height:44px}
    .cart-toggle-btn:active{background:#0F6E56}
    .cart-toggle-btn:disabled{background:#d8d6d0;cursor:default}
    .cart-toggle-btn.icon-only{padding:0;border-radius:50%;width:44px;height:44px}
    .cart-detail{flex:1;overflow-y:auto;padding:4px 16px 0}
    .cart-header-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0 10px;border-bottom:0.5px solid #e8e6e0}
    .cart-title{font-size:15px;font-weight:600;color:#1a1a18}
    .clear-all-btn{font-size:12px;color:#888;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 8px;border-radius:6px}
    .clear-all-btn:active{background:#f5f5f0}
    .ci{border-bottom:0.5px solid #e8e6e0;padding:10px 0}
    .ci-top{display:flex;align-items:center;gap:8px}
    .ci-name{flex:1;font-size:14px;font-weight:500;color:#1a1a18}
    .ci-price{font-size:13px;color:#888;min-width:70px;text-align:right}
    .ci-bottom{margin-top:8px}
    .ci-note{width:100%;border:0.5px solid #e8e6e0;border-radius:8px;padding:6px 10px;font-size:12px;color:#1a1a18;background:#f5f5f0;font-family:inherit}
    .ci-note:focus{outline:none;border-color:#1D9E75}
    .ci-note::placeholder{color:#bbb}
    .cart-footer{padding:12px 16px 28px;border-top:0.5px solid #e8e6e0;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
    .total-row{display:flex;justify-content:space-between;font-size:16px;font-weight:600;color:#1a1a18}
    .pay-method-label{font-size:12px;color:#888;margin-bottom:6px}
    .pay-method-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .pay-method-btn{padding:11px;border-radius:12px;border:0.5px solid #d8d6d0;background:#f5f5f0;font-size:13px;font-weight:500;cursor:pointer;color:#1a1a18;font-family:inherit;transition:all .15s;text-align:center}
    .pay-method-btn:active{background:#e8e6e0}
    .pay-method-btn.selected{background:#E1F5EE;border-color:#1D9E75;color:#085041}
    .qr-section{display:none;flex-direction:column;align-items:center;gap:8px;background:#f5f5f0;border-radius:12px;padding:14px}
    .qr-section.show{display:flex}
    .qr-section img{width:180px;height:180px;border-radius:8px;border:0.5px solid #e8e6e0;background:#fff}
    .qr-amount{font-size:18px;font-weight:700;color:#1D9E75}
    .qr-name{font-size:12px;color:#444;font-weight:500}
    .qr-bank{font-size:12px;color:#888}
    .qr-hint{font-size:11px;color:#bbb;text-align:center}
    .confirm-btn{padding:14px;border-radius:12px;border:none;background:#d8d6d0;font-size:15px;font-weight:600;cursor:default;color:#fff;font-family:inherit;transition:all .2s;width:100%}
    .confirm-btn.active{background:#1D9E75;cursor:pointer}
    .confirm-btn.active:active{background:#0F6E56}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:200}
    .cart-empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 0;gap:8px;color:#bbb;font-size:13px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .logout-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}
    .logout-sheet-title{font-size:15px;font-weight:600;color:#1a1a18;text-align:center}
    .logout-sheet-sub{font-size:13px;color:#888;text-align:center}
    .logout-confirm-btn{padding:14px;border-radius:12px;border:none;background:#FCEBEB;color:#A32D2D;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .logout-confirm-btn:active{background:#F7C1C1}
    .logout-cancel-btn{padding:14px;border-radius:12px;border:0.5px solid #e8e6e0;background:#f5f5f0;color:#1a1a18;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
    .logout-cancel-btn:active{background:#e8e6e0}
  </style>
</head>
<body>

<div class="status-bar">
  <div class="status-left">
    <span class="status-title">Bán hàng</span>
    <span class="user-name" id="userName"></span>
  </div>
  <div class="status-right">
    <div class="net-indicator">
      <div class="net-dot" id="netDot"></div>
      <span class="net-label" id="netLabel">Online</span>
    </div>
    <span class="order-badge" id="orderBadge">#001</span>
    <button class="logout-btn" onclick="showLogout()" title="Đăng xuất">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</div>

<div class="cat-bar" id="catBar"></div>
<div class="menu-list" id="menuList"></div>

<div class="bottom-cart" id="bottomCart">
  <div class="handle"></div>
  <div class="cart-collapsed" onclick="toggleCart()">
    <div class="cart-summary">
      <div class="cart-lbl">Đơn <span id="orderNum">#001</span></div>
      <div class="cart-total-big">
        <span id="cartTotal">0 ₫</span>
        <span class="count-badge" id="countBadge" style="display:none">0</span>
      </div>
    </div>
    <button class="cart-toggle-btn" id="cartToggleBtn" disabled
      onclick="event.stopPropagation();toggleCart()">
      <span id="cartBtnContent">Xem giỏ hàng</span>
    </button>
  </div>
  <div class="cart-detail">
    <div class="cart-header-row">
      <span class="cart-title">Giỏ hàng</span>
      <button class="clear-all-btn" onclick="clearAll()">Xoá tất cả</button>
    </div>
    <div id="cartItems"></div>
  </div>
  <div class="cart-footer">
    <div class="total-row">
      <span>Tổng cộng</span>
      <span id="footerTotal">0 ₫</span>
    </div>
    <div>
      <div class="pay-method-label">Chọn hình thức thanh toán</div>
      <div class="pay-method-grid">
        <button class="pay-method-btn" id="btnCash" onclick="selectMethod('cash')">Tiền mặt</button>
        <button class="pay-method-btn" id="btnTransfer" onclick="selectMethod('transfer')">Chuyển khoản</button>
      </div>
    </div>
    <div class="qr-section" id="qrSection">
      <img id="qrImg" src="" alt="QR chuyển khoản">
      <div class="qr-amount" id="qrAmount"></div>
      <div class="qr-name" id="qrName"></div>
      <div class="qr-bank">ACB — <span id="qrAccount"></span></div>
      <div class="qr-hint">Khách quét QR — số tiền tự động điền</div>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="confirmPay()">Xác nhận thanh toán</button>
  </div>
</div>

<div class="overlay" id="logoutOverlay" onclick="hideLogout()">
  <div class="logout-sheet" onclick="event.stopPropagation()">
    <div class="logout-sheet-title">Đăng xuất?</div>
    <div class="logout-sheet-sub" id="logoutSub"></div>
    <button class="logout-confirm-btn" onclick="doLogout()">Đăng xuất</button>
    <button class="logout-cancel-btn" onclick="hideLogout()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../auth/auth.js"></script>
<script>
  Auth.require('pos');
  const session = Auth.getSession();
  if(session) document.getElementById('userName').textContent = session.name;

  // ══════════════════════════════════════════
  // CẤU HÌNH THANH TOÁN
  // TODO: Điền thông tin tài khoản ACB của bạn
  const PAYMENT_CONFIG = {
    bankId:      'ACB',
    accountNo:   'XXXXXXXXXX',
    accountName: 'NGUYEN VAN A',
  };
  // ══════════════════════════════════════════

  const MENU = [
    {
      id:1, name:'Cà phê đen', price:18000,
      cat:'Cà phê', icon:'☕', bg:'#FAEEDA',
      ingredients:[
        {id:'cot_ca_phe', amount:60, unit:'ml'},
        {id:'nuoc_duong',  amount:20, unit:'ml'},
      ]
    },
    {
      id:2, name:'Cà phê sữa', price:20000,
      cat:'Cà phê', icon:'☕', bg:'#FAC77540',
      ingredients:[
        {id:'cot_ca_phe', amount:50, unit:'ml'},
        {id:'sua_dac',    amount:20, unit:'g' },
      ]
    },
    {
      id:3, name:'Cà phê sữa tươi', price:22000,
      cat:'Cà phê', icon:'☕', bg:'#EF9F2730',
      ingredients:[
        {id:'cot_ca_phe', amount:30, unit:'ml'},
        {id:'sua_dac',    amount:30, unit:'g' },
        {id:'sua_tuoi',   amount:70, unit:'ml'},
      ]
    },
    {
      id:4, name:'Cà phê kem muối', price:24000,
      cat:'Cà phê', icon:'☕', bg:'#B5D4F440',
      ingredients:[
        {id:'cot_ca_phe', amount:50, unit:'ml'},
        {id:'sua_dac',    amount:20, unit:'g' },
        {id:'kem_muoi',   amount:30, unit:'g' },
      ]
    },
    {
      id:5, name:'Matcha latte', price:23000,
      cat:'Matcha & Cacao', icon:'🍵', bg:'#C0DD9740',
      ingredients:[
        {id:'cot_matcha', amount:40, unit:'ml'},
        {id:'sua_dac',    amount:30, unit:'g' },
        {id:'sua_tuoi',   amount:70, unit:'ml'},
      ]
    },
    {
      id:6, name:'Cacao latte', price:23000,
      cat:'Matcha & Cacao', icon:'🍫', bg:'#BA751730',
      ingredients:[
        {id:'cot_cacao',  amount:40, unit:'ml'},
        {id:'sua_dac',    amount:30, unit:'g' },
        {id:'sua_tuoi',   amount:70, unit:'ml'},
      ]
    },
  ];

  const CATS=['Tất cả',...new Set(MENU.map(m=>m.cat))];
  let activeCat='Tất cả', cart={}, notes={}, orderN=1, expanded=false, payMethod=null;
  const fmt = n => n.toLocaleString('vi-VN') + ' ₫';
  const getTotal = () => Object.keys(cart).reduce((s,k) => s + MENU.find(m=>m.id==k).price * cart[k], 0);

  function renderCats(){
    document.getElementById('catBar').innerHTML = CATS.map(c =>
      `<button class="cat-pill${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</button>`
    ).join('');
  }
  function setCat(c){activeCat=c;renderCats();renderMenu();}

  function renderMenu(){
    const items = activeCat==='Tất cả' ? MENU : MENU.filter(m=>m.cat===activeCat);
    document.getElementById('menuList').innerHTML = items.map(item => {
      const qty=cart[item.id]||0, out=item.stock===0;
      return `<div class="menu-row${out?' out':''}">
        <div class="micon" style="background:${item.bg}">${item.icon}</div>
        <div class="minfo">
          <div class="mname">${item.name}</div>
          <div class="mprice">${fmt(item.price)}</div>
          ${item.stock===0?'<div class="mtag out">Hết hàng</div>':item.stock!=null&&item.stock<10?`<div class="mtag low">Còn ${item.stock} ly</div>`:''}
        </div>
        ${out?'':qty===0
          ?`<button class="add-btn" onclick="add(${item.id})">+</button>`
          :`<div class="qty-ctrl">
              <button class="qb" onclick="chg(${item.id},-1)">−</button>
              <span class="qn">${qty}</span>
              <button class="qb" onclick="chg(${item.id},1)">+</button>
            </div>`}
      </div>`;
    }).join('');
  }

  function add(id){cart[id]=(cart[id]||0)+1;if(!notes[id])notes[id]='';payMethod=null;update();toast('+1 '+MENU.find(m=>m.id===id).name);}
  function chg(id,d){cart[id]=(cart[id]||0)+d;if(cart[id]<=0){delete cart[id];delete notes[id];}payMethod=null;update();}
  function clearAll(){cart={};notes={};payMethod=null;update();if(expanded)toggleCart();}
  function update(){renderMenu();renderCartItems();updateCartBar();updatePaymentUI();}

  function updateCartBar(){
    const count=Object.keys(cart).reduce((s,k)=>s+cart[k],0), total=getTotal();
    document.getElementById('cartTotal').textContent=fmt(total);
    document.getElementById('footerTotal').textContent=fmt(total);
    const badge=document.getElementById('countBadge');
    badge.textContent=count; badge.style.display=count>0?'inline':'none';
    const btn=document.getElementById('cartToggleBtn');
    btn.disabled=count===0;
    const content=document.getElementById('cartBtnContent');
    if(expanded){
      btn.classList.add('icon-only');
      content.innerHTML=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`;
    } else {
      btn.classList.remove('icon-only');
      content.textContent='Xem giỏ hàng';
    }
  }

  function renderCartItems(){
    const keys=Object.keys(cart);
    if(!keys.length){
      document.getElementById('cartItems').innerHTML=`<div class="cart-empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Chưa có món nào</div>`;
      return;
    }
    document.getElementById('cartItems').innerHTML=keys.map(id=>{
      const item=MENU.find(m=>m.id==id);
      return `<div class="ci">
        <div class="ci-top">
          <span class="ci-name">${item.name}</span>
          <div class="qty-ctrl">
            <button class="qb" onclick="chg(${id},-1)">−</button>
            <span class="qn">${cart[id]}</span>
            <button class="qb" onclick="chg(${id},1)">+</button>
          </div>
          <span class="ci-price">${fmt(item.price*cart[id])}</span>
        </div>
        <div class="ci-bottom">
          <input class="ci-note" placeholder="Ghi chú: ít đường, không đá..."
            value="${notes[id]||''}" oninput="notes[${id}]=this.value"
            onclick="event.stopPropagation()">
        </div>
      </div>`;
    }).join('');
  }

  function selectMethod(method){payMethod=method;updatePaymentUI();}

  function updatePaymentUI(){
    const total=getTotal(), hasItems=Object.keys(cart).length>0;
    document.getElementById('btnCash').classList.toggle('selected',payMethod==='cash');
    document.getElementById('btnTransfer').classList.toggle('selected',payMethod==='transfer');
    const qr=document.getElementById('qrSection');
    if(payMethod==='transfer'&&hasItems){qr.classList.add('show');updateQR(total);}
    else qr.classList.remove('show');
    document.getElementById('confirmBtn').classList.toggle('active',payMethod!==null&&hasItems);
  }

  function updateQR(amount){
    const{bankId,accountNo,accountName}=PAYMENT_CONFIG;
    const url=`https://img.vietqr.io/image/${bankId}-${accountNo}-compact2.jpg?amount=${amount}&addInfo=Thanh toan don hang&accountName=${encodeURIComponent(accountName)}`;
    document.getElementById('qrImg').src=url;
    document.getElementById('qrAmount').textContent=fmt(amount);
    document.getElementById('qrName').textContent=accountName;
    document.getElementById('qrAccount').textContent=accountNo;
  }

  function toggleCart(){
    if(Object.keys(cart).length===0&&!expanded)return;
    expanded=!expanded;
    document.getElementById('bottomCart').classList.toggle('expanded',expanded);
    if(!expanded){payMethod=null;updatePaymentUI();}
    updateCartBar();
  }

  function confirmPay(){
    if(!document.getElementById('confirmBtn').classList.contains('active'))return;
    const total=getTotal(), methodName=payMethod==='cash'?'Tiền mặt':'Chuyển khoản';
    const orderNum='#'+String(orderN).padStart(3,'0');

    // ── GHI NHẬN ĐƠN HÀNG (cho module doanh thu) ──
    saveOrder(orderNum, total, methodName);

    // ── TRỪ TỒN KHO BÁN THÀNH PHẨM ──
    deductIngredients();

    toast(`✓ ${methodName} — ${fmt(total)}`);
    cart={};notes={};payMethod=null;
    orderN++;
    const num='#'+String(orderN).padStart(3,'0');
    document.getElementById('orderNum').textContent=num;
    document.getElementById('orderBadge').textContent=num;
    expanded=false;
    document.getElementById('bottomCart').classList.remove('expanded');
    update();
  }

  // Lưu đơn hàng vào localStorage để module doanh thu đọc
  function saveOrder(orderNum, total, method){
    const orders = JSON.parse(localStorage.getItem('fnb_orders')||'[]');
    const items = Object.keys(cart).map(id => {
      const item = MENU.find(m=>m.id==id);
      return { id: item.id, name: item.name, qty: cart[id], price: item.price };
    });
    orders.push({
      ts:       new Date().toISOString(),
      orderNum,
      total,
      method,
      items,
      staff:    Auth.getSession()?.name || '',
    });
    // Giữ tối đa 10.000 đơn gần nhất
    if(orders.length > 10000) orders.splice(0, orders.length - 10000);
    localStorage.setItem('fnb_orders', JSON.stringify(orders));
  }

  // Trừ tồn kho bán thành phẩm sau mỗi đơn
  function deductIngredients(){
    const inv = JSON.parse(localStorage.getItem('fnb_semi_stock')||'{}');
    Object.keys(cart).forEach(id => {
      const item = MENU.find(m=>m.id==id);
      const qty  = cart[id];
      if(!item.ingredients) return;
      item.ingredients.forEach(ing => {
        if(inv[ing.id] != null){
          inv[ing.id] = Math.max(0, (inv[ing.id]||0) - ing.amount * qty);
        }
      });
    });
    localStorage.setItem('fnb_semi_stock', JSON.stringify(inv));
  }

  function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.style.opacity='1';
    clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity='0',2200);
  }

  function showLogout(){
    const s=Auth.getSession();
    document.getElementById('logoutSub').textContent=s?`Đang đăng nhập: ${s.name}`:'';
    document.getElementById('logoutOverlay').classList.add('show');
  }
  function hideLogout(){document.getElementById('logoutOverlay').classList.remove('show');}
  function doLogout(){Auth.logout();}

  function updateNetStatus(){
    const online=navigator.onLine;
    document.getElementById('netDot').className='net-dot'+(online?'':' offline');
    document.getElementById('netLabel').textContent=online?'Online':'Offline';
  }
  window.addEventListener('online',updateNetStatus);
  window.addEventListener('offline',updateNetStatus);
  updateNetStatus();

  renderCats();renderMenu();
</script>
</body>
</html>
