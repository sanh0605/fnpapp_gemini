<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FNB App — Tài chính</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;color:#888;text-decoration:none}
    .header-title{font-size:15px;font-weight:600}
    .export-btn{padding:6px 14px;border-radius:20px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:12px;font-weight:500;color:#888;cursor:pointer}
    .period-bar{background:#fff;padding:10px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .period-bar::-webkit-scrollbar{display:none}
    .period-btn{padding:6px 14px;border-radius:20px;border:0.5px solid #d8d6d0;background:transparent;color:#888;font-size:13px;white-space:nowrap;cursor:pointer}
    .period-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
    .date-nav{background:#fff;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .nav-arrow{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;color:#888;cursor:pointer}
    .date-label{font-size:14px;font-weight:500}
    .today-btn{font-size:12px;color:#1D9E75;background:none;border:none;cursor:pointer;padding:4px 8px}
    .tabs{background:#fff;display:flex;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .tab{flex:1;padding:10px 0;font-size:12px;font-weight:500;color:#888;text-align:center;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
    .tab.active{color:#1D9E75;border-bottom-color:#1D9E75}
    .content{flex:1;overflow-y:auto;padding:12px 14px 32px;display:flex;flex-direction:column;gap:10px}
    .card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;overflow:hidden;margin-bottom:8px}
    .card-header{padding:12px 14px;background:#f5f5f0;border-bottom:0.5px solid #e8e6e0;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
    .row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:0.5px solid #e8e6e0}
    .row:last-child{border-bottom:none}
    .row.section{background:#f5f5f040;padding:6px 14px}
    .label{font-size:13px;color:#1a1a18}
    .label.muted{color:#888;font-size:12px}
    .label.bold{font-weight:600;font-size:14px}
    .val{font-size:13px;font-weight:500;text-align:right}
    .val.green{color:#1D9E75}
    .val.red{color:#E24B4A}
    .val.blue{color:#378ADD}
    .val.bold{font-size:15px;font-weight:700}
    .val.muted{color:#888;font-size:12px}
    .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .metric-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:13px 14px}
    .metric-card.full{grid-column:span 2}
    .metric-label{font-size:11px;color:#888;margin-bottom:6px}
    .metric-value{font-size:20px;font-weight:700}
    .metric-sub{font-size:12px;color:#888;margin-top:4px}
    .action-btn{padding:5px 12px;border-radius:20px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:12px;font-weight:500;cursor:pointer}
    .action-btn.outline{background:transparent;border-color:#d8d6d0;color:#1a1a18}
    .item-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid #e8e6e0;cursor:pointer}
    .item-icon{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:13px;font-weight:500}
    .item-sub{font-size:11px;color:#888;margin-top:1px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:85dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:#888;font-weight:500}
    .field input, .field select{width:100%;padding:11px 14px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:15px;background:#f5f5f0}
    .sheet-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer}
    .sheet-btn.primary{background:#1D9E75;color:#fff}
    .sheet-btn.secondary{background:#f5f5f0;border:0.5px solid #e8e6e0}
    .sheet-btn.danger{background:#FCEBEB;color:#A32D2D}
    .empty{padding:24px 0;text-align:center;color:#bbb;font-size:13px}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;z-index:400}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="../pos/index.html" class="back-btn">❮</a>
    <span class="header-title">Tài chính</span>
  </div>
</div>

<div class="period-bar">
  <button class="period-btn active" id="p-day" onclick="setPeriod('day')">Hôm nay</button>
  <button class="period-btn" id="p-week" onclick="setPeriod('week')">Tuần này</button>
  <button class="period-btn" id="p-month" onclick="setPeriod('month')">Tháng này</button>
  <button class="period-btn" id="p-year" onclick="setPeriod('year')">Năm</button>
</div>

<div class="date-nav" id="dateNav">
  <button class="nav-arrow" onclick="shiftPeriod(-1)">❮</button>
  <span class="date-label" id="dateLabel"></span>
  <div style="display:flex;gap:6px">
    <button class="today-btn" onclick="goToday()">Hôm nay</button>
    <button class="nav-arrow" onclick="shiftPeriod(1)">❯</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab1" onclick="switchTab(1)">P&L</button>
  <button class="tab" id="tab2" onclick="switchTab(2)">Chi phí</button>
  <button class="tab" id="tab3" onclick="switchTab(3)">Giá vốn</button>
  <button class="tab" id="tab4" onclick="switchTab(4)">Vốn & Tài sản</button>
</div>

<div class="content" id="content"></div>

<div class="overlay" id="expenseOverlay" onclick="hideExpense()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="expenseSheetTitle">Thêm chi phí</div>
    <div class="field"><label>Tên</label><input type="text" id="expName"></div>
    <div class="field"><label>Danh mục</label>
      <select id="expCat"><option value="van_hanh">Vận hành</option><option value="nhan_su">Nhân sự</option><option value="khac">Khác</option></select>
    </div>
    <div class="field"><label>Chu kỳ</label>
      <select id="expType"><option value="once">1 lần</option><option value="daily">Hàng ngày</option><option value="monthly">Hàng tháng</option></select>
    </div>
    <div class="field"><label>Số tiền (₫)</label><input type="number" id="expAmount"></div>
    <div class="field"><label>Ngày</label><input type="date" id="expDate"></div>
    <button class="sheet-btn primary" onclick="saveExpense()">Lưu</button>
    <button class="sheet-btn danger" id="deleteExpBtn" style="display:none" onclick="deleteExpense()">Xoá</button>
    <button class="sheet-btn secondary" onclick="hideExpense()">Huỷ</button>
  </div>
</div>

<div class="overlay" id="capitalOverlay" onclick="hideCapital()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Quản lý dòng vốn</div>
    <div class="field"><label>Loại</label><select id="capType"><option value="in">Góp vốn</option><option value="out">Rút vốn</option></select></div>
    <div class="field"><label>Số tiền</label><input type="number" id="capAmount"></div>
    <div class="field"><label>Ghi chú</label><input type="text" id="capNote"></div>
    <div class="field"><label>Ngày</label><input type="date" id="capDate"></div>
    <button class="sheet-btn primary" onclick="saveCapital()">Lưu</button>
    <button class="sheet-btn secondary" onclick="hideCapital()">Huỷ</button>
  </div>
</div>

<div class="overlay" id="assetOverlay" onclick="hideAsset()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Mua Tài sản</div>
    <div class="field"><label>Tên</label><input type="text" id="assetName"></div>
    <div class="field"><label>Giá trị (₫)</label><input type="number" id="assetAmount"></div>
    <div class="field"><label>Số tháng khấu hao</label><input type="number" id="assetMonths" value="12"></div>
    <div class="field"><label>Ngày</label><input type="date" id="assetDate"></div>
    <button class="sheet-btn primary" onclick="saveAsset()">Lưu</button>
    <button class="sheet-btn secondary" onclick="hideAsset()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../auth/auth.js"></script>
<script>
  // ── DATA & CONFIG ──
  const MENU = [
    {id:1, price:18000, ingredients:[{id:'cot_ca_phe',amount:60}]},
    {id:2, price:20000, ingredients:[{id:'cot_ca_phe',amount:50},{id:'sua_dac',amount:20}]}
  ];
  const SEMI_RECIPES = [
    {id:'cot_ca_phe', yields:500, recipe:[{id:'ca_phe_bot',amount:200}]}
  ];

  let period='month', cursor=new Date(), activeTab=1;
  let editingExpId=null;
  cursor.setHours(0,0,0,0);
  const fmt = n => (n||0).toLocaleString('vi-VN') + ' ₫';
  const toDateInput = d => { const dd=new Date(d); return `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`; };

  // ── STORAGE ──
  const getOrders = () => JSON.parse(localStorage.getItem('fnb_orders') || '[]');
  const getExpenses = () => JSON.parse(localStorage.getItem('fnb_expenses') || '[]');
  const setExpenses = d => localStorage.setItem('fnb_expenses', JSON.stringify(d));
  const getCogPrices = () => JSON.parse(localStorage.getItem('fnb_cog_prices') || '{}');
  const getCapitals = () => JSON.parse(localStorage.getItem('fnb_capitals') || '[]');
  const setCapitals = d => localStorage.setItem('fnb_capitals', JSON.stringify(d));
  const getAssets = () => JSON.parse(localStorage.getItem('fnb_assets') || '[]');
  const setAssets = d => localStorage.setItem('fnb_assets', JSON.stringify(d));

  // ── LOGIC ──
  function getRange(){
    const d=new Date(cursor); let from, to;
    if(period==='day'){from=new Date(d); from.setHours(0,0,0,0); to=new Date(d); to.setHours(23,59,59,999);}
    else if(period==='month'){from=new Date(d.getFullYear(),d.getMonth(),1); to=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999);}
    else {from=new Date(d); from.setHours(0,0,0,0); to=new Date(d); to.setHours(23,59,59,999);}
    return {from,to};
  }
  function setPeriod(p){ period=p; ['day','week','month','year'].forEach(x=> document.getElementById('p-'+x).classList.toggle('active',x===p)); cursor=new Date(); render(); }
  function shiftPeriod(dir){ if(period==='day')cursor.setDate(cursor.getDate()+dir); else if(period==='month')cursor.setMonth(cursor.getMonth()+dir); render(); }
  function goToday(){ cursor=new Date(); render(); }
  function switchTab(n){ activeTab=n; [1,2,3,4].forEach(i=>document.getElementById('tab'+i).classList.toggle('active',i===n)); render(); }

  function calcExpenses(from, to){
    const expenses = getExpenses(); const assets = getAssets();
    const days = Math.max(1, Math.round((to-from)/(1000*60*60*24))+1);
    let totalOpex = 0;
    expenses.forEach(e=>{
      let amt=0; const d=new Date(e.date);
      if(e.type==='once' && d>=from && d<=to) amt=e.amount;
      else if(d<=to) { if(e.type==='daily')amt=e.amount*days; else if(e.type==='monthly')amt=e.amount*Math.max(1,Math.round(days/30)); }
      totalOpex += amt;
    });
    let totalDep = 0;
    assets.forEach(a=>{
      if(a.months>0 && new Date(a.date)<=to) {
        totalDep += (a.amount/a.months) * Math.max(1,Math.round(days/30));
      }
    });
    return Math.round(totalOpex + totalDep);
  }

  function calcBalance(){
    let inC=0, outC=0; getCapitals().forEach(c=>{ if(c.type==='in')inC+=c.amount; else outC+=c.amount; });
    const netCapital = inC - outC;
    const totalAsset = getAssets().reduce((s,a)=>s+a.amount, 0);
    // Tính lợi nhuận đơn giản = (Doanh thu - CP thủ công). Note: Lẽ ra cần hàm all-time.
    let manualOpex=0; getExpenses().forEach(e=> { if(e.type==='once') manualOpex+=e.amount; else if(e.type==='monthly') manualOpex+=e.amount; });
    const rev = getOrders().reduce((s,o)=>s+o.total,0);
    const cashOnHand = netCapital + rev - manualOpex - totalAsset;
    return {netCapital, totalAsset, cashOnHand};
  }

  // ── RENDER ──
  function render(){
    const {from, to} = getRange();
    document.getElementById('dateLabel').textContent = period==='day'?from.toLocaleDateString('vi-VN'):from.toLocaleDateString('vi-VN',{month:'long',year:'numeric'});
    const el = document.getElementById('content');
    if(activeTab===1){
      const orders = getOrders().filter(o=>{const d=new Date(o.ts); return d>=from&&d<=to;});
      const rev = orders.reduce((s,o)=>s+o.total,0);
      const opex = calcExpenses(from, to);
      const net = rev - opex;
      el.innerHTML = `
        <div class="metrics-grid">
          <div class="metric-card full"><div class="metric-label">Lợi Nhuận Thuần</div><div class="metric-value ${net>=0?'green':'red'}">${fmt(net)}</div></div>
        </div>
        <div class="card">
          <div class="card-header">P&L Rút Gọn</div>
          <div class="row"><span class="label">Doanh thu</span><span class="val green">${fmt(rev)}</span></div>
          <div class="row"><span class="label">Chi phí (Opex & Khấu hao)</span><span class="val red">-${fmt(opex)}</span></div>
        </div>
      `;
    } else if(activeTab===2){
      el.innerHTML = `<div class="card"><div class="card-header"><span>Chi Phí</span><button class="action-btn" onclick="showExpense()">+ Thêm</button></div>
        ${getExpenses().map(e=>`<div class="item-row" onclick="showExpense('${e.id}')"><div class="item-info"><div class="item-name">${e.name}</div><div class="item-sub">${e.type}</div></div><div class="val">${fmt(e.amount)}</div></div>`).join('')}</div>`;
    } else if(activeTab===3){
      el.innerHTML = `<div class="card"><div class="card-header">Giá Vốn (Đang lấy từ kho)</div><div class="empty">Dữ liệu được cập nhật từ màn hình POS.</div></div>`;
    } else {
      const bs = calcBalance();
      el.innerHTML = `
        <div class="metrics-grid"><div class="metric-card full"><div class="metric-label">Tiền mặt hiện tại (Ước tính)</div><div class="metric-value blue">${fmt(bs.cashOnHand)}</div></div></div>
        <div class="card"><div class="card-header"><span>Nguồn Vốn</span><button class="action-btn" onclick="showCapital()">+ Quản lý</button></div>
          ${getCapitals().map(c=>`<div class="item-row"><div class="item-info"><div class="item-name">${c.note||(c.type==='in'?'Góp':'Rút')}</div></div><div class="val ${c.type==='in'?'green':'red'}">${fmt(c.amount)}</div></div>`).join('')}</div>
        <div class="card"><div class="card-header"><span>Tài Sản</span><button class="action-btn" onclick="showAsset()">+ Mua</button></div>
          ${getAssets().map(a=>`<div class="item-row"><div class="item-info"><div class="item-name">${a.name}</div><div class="item-sub">Khấu hao ${a.months}T</div></div><div class="val">${fmt(a.amount)}</div></div>`).join('')}</div>
      `;
    }
  }

  // ── OVERLAYS ──
  function showExpense(id){
    editingExpId=id; const e=getExpenses().find(x=>x.id===id);
    document.getElementById('expenseSheetTitle').textContent=id?'Sửa chi phí':'Thêm chi phí';
    document.getElementById('expName').value=e?e.name:''; document.getElementById('expAmount').value=e?e.amount:'';
    document.getElementById('expDate').value=toDateInput(e?e.date:new Date());
    document.getElementById('deleteExpBtn').style.display=id?'block':'none';
    document.getElementById('expenseOverlay').classList.add('show');
  }
  function hideExpense(){document.getElementById('expenseOverlay').classList.remove('show');}
  function saveExpense(){
    const e = getExpenses(), name=document.getElementById('expName').value, amount=parseFloat(document.getElementById('expAmount').value), type=document.getElementById('expType').value, date=document.getElementById('expDate').value;
    if(editingExpId) { const idx=e.findIndex(x=>x.id===editingExpId); e[idx]={...e[idx], name, amount, type, date}; }
    else e.push({id:'exp_'+Date.now(), name, amount, type, date, cat:document.getElementById('expCat').value});
    setExpenses(e); hideExpense(); render(); toast('Đã lưu');
  }
  function deleteExpense(){ setExpenses(getExpenses().filter(e=>e.id!==editingExpId)); hideExpense(); render(); toast('Đã xoá'); }

  function showCapital(){ document.getElementById('capitalOverlay').classList.add('show'); document.getElementById('capDate').value=toDateInput(new Date());}
  function hideCapital(){ document.getElementById('capitalOverlay').classList.remove('show'); }
  function saveCapital(){
    const c=getCapitals(); c.push({id:'cap_'+Date.now(), type:document.getElementById('capType').value, amount:parseFloat(document.getElementById('capAmount').value), note:document.getElementById('capNote').value, date:document.getElementById('capDate').value});
    setCapitals(c); hideCapital(); render(); toast('Đã lưu');
  }

  function showAsset(){ document.getElementById('assetOverlay').classList.add('show'); document.getElementById('assetDate').value=toDateInput(new Date());}
  function hideAsset(){ document.getElementById('assetOverlay').classList.remove('show'); }
  function saveAsset(){
    const a=getAssets(); a.push({id:'ast_'+Date.now(), name:document.getElementById('assetName').value, amount:parseFloat(document.getElementById('assetAmount').value), months:parseInt(document.getElementById('assetMonths').value), date:document.getElementById('assetDate').value});
    setAssets(a); hideAsset(); render(); toast('Đã lưu');
  }

  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2200); }

  render();
</script>
</body>
</html>
