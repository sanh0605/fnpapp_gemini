<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Tài chính</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;text-decoration:none;flex-shrink:0}
    .header-title{font-size:15px;font-weight:600;color:#1a1a18}
    .export-btn{padding:6px 14px;border-radius:20px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:12px;font-weight:500;color:#888;cursor:pointer;font-family:inherit}
    .export-btn:active{background:#e8e6e0}

    .period-bar{background:#fff;padding:10px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .period-bar::-webkit-scrollbar{display:none}
    .period-btn{padding:6px 14px;border-radius:20px;border:0.5px solid #d8d6d0;background:transparent;color:#888;font-size:13px;white-space:nowrap;cursor:pointer;transition:all .15s;font-family:inherit}
    .period-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff}

    .date-nav{background:#fff;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .nav-arrow{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888}
    .nav-arrow:active{background:#e8e6e0}
    .date-label{font-size:14px;font-weight:500;color:#1a1a18}
    .today-btn{font-size:12px;color:#1D9E75;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px}

    .tabs{background:#fff;display:flex;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .tab{flex:1;padding:10px 0;font-size:12px;font-weight:500;color:#888;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
    .tab.active{color:#1D9E75;border-bottom-color:#1D9E75}

    .content{flex:1;overflow-y:auto;padding:12px 14px 32px;display:flex;flex-direction:column;gap:10px}

    /* Cards & Layouts */
    .pl-card, .expense-card, .balance-card {background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;overflow:hidden;margin-bottom:8px}
    .pl-header, .card-header {padding:12px 14px;background:#f5f5f0;border-bottom:0.5px solid #e8e6e0;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
    .pl-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:0.5px solid #e8e6e0}
    .pl-row:last-child{border-bottom:none}
    .pl-row.total{background:#f5f5f0}
    .pl-row.profit{background:#E1F5EE20}
    .pl-row.loss{background:#FCEBEB20}
    .pl-row.section{background:#f5f5f040;padding:6px 14px}
    .pl-label{font-size:13px;color:#1a1a18}
    .pl-label.muted{color:#888;font-size:12px}
    .pl-label.bold{font-weight:600;font-size:14px}
    .pl-value{font-size:13px;font-weight:500;color:#1a1a18;text-align:right}
    .pl-value.green{color:#1D9E75}
    .pl-value.red{color:#E24B4A}
    .pl-value.bold{font-size:15px;font-weight:700}
    .pl-value.muted{color:#888;font-size:12px}
    .pl-pct{font-size:11px;color:#888;text-align:right;margin-top:1px}

    .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .metric-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:13px 14px}
    .metric-card.full{grid-column:span 2}
    .metric-label{font-size:11px;color:#888;font-weight:500;margin-bottom:6px}
    .metric-value{font-size:20px;font-weight:700;color:#1a1a18}
    .metric-value.green{color:#1D9E75}
    .metric-value.red{color:#E24B4A}
    .metric-value.blue{color:#378ADD}
    .metric-sub{font-size:12px;color:#888;margin-top:4px}

    .action-btn{padding:5px 12px;border-radius:20px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
    .action-btn:active{background:#9FE1CB}
    .action-btn.outline{background:transparent;border-color:#d8d6d0;color:#1a1a18}

    .item-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid #e8e6e0;cursor:pointer}
    .item-row:last-child{border-bottom:none}
    .item-icon{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:13px;font-weight:500;color:#1a1a18}
    .item-sub{font-size:11px;color:#888;margin-top:1px}
    .item-amount{font-size:13px;font-weight:500;color:#1a1a18;text-align:right}

    /* Cogs Icon Row */
    .cogs-icon{font-size:18px;flex-shrink:0}
    .cogs-cost{font-size:13px;font-weight:500;color:#1a1a18;text-align:right;min-width:80px}
    .cogs-unit{font-size:11px;color:#888;text-align:right}

    /* Overlay / Sheet */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:85dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600;color:#1a1a18}
    .sheet-sub{font-size:13px;color:#888;margin-top:-8px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:#888;font-weight:500}
    .field input,.field select{width:100%;padding:11px 14px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:15px;color:#1a1a18;background:#f5f5f0;font-family:inherit}
    .field input:focus,.field select:focus{outline:none;border-color:#1D9E75;background:#fff}
    .sheet-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .sheet-btn.primary{background:#1D9E75;color:#fff}
    .sheet-btn.secondary{background:#f5f5f0;color:#1a1a18;border:0.5px solid #e8e6e0}
    .sheet-btn.danger{background:#FCEBEB;color:#A32D2D}

    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 0;gap:8px;color:#bbb;font-size:13px}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:400}
    .info-box{background:#E6F1FB;border-radius:10px;padding:10px 14px;font-size:12px;color:#0C447C;line-height:1.6;margin-bottom:8px}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="../pos/index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="header-title">Tài chính</span>
  </div>
  <button class="export-btn" onclick="exportCSV()">Xuất CSV</button>
</div>

<div class="period-bar">
  <button class="period-btn active" id="p-day"   onclick="setPeriod('day')">Hôm nay</button>
  <button class="period-btn"        id="p-week"  onclick="setPeriod('week')">Tuần này</button>
  <button class="period-btn"        id="p-month" onclick="setPeriod('month')">Tháng này</button>
  <button class="period-btn"        id="p-year"  onclick="setPeriod('year')">Năm này</button>
  <button class="period-btn"        id="p-custom" onclick="setPeriod('custom')">Tuỳ chọn</button>
</div>

<div class="date-nav" id="dateNav">
  <button class="nav-arrow" onclick="shiftPeriod(-1)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="date-label" id="dateLabel"></span>
  <div style="display:flex;align-items:center;gap:6px">
    <button class="today-btn" onclick="goToday()">Hôm nay</button>
    <button class="nav-arrow" onclick="shiftPeriod(1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab1" onclick="switchTab(1)">P&amp;L</button>
  <button class="tab"        id="tab2" onclick="switchTab(2)">Chi phí</button>
  <button class="tab"        id="tab3" onclick="switchTab(3)">Giá vốn</button>
  <button class="tab"        id="tab4" onclick="switchTab(4)">Vốn & Tài sản</button>
</div>

<div class="content" id="content"></div>

<div class="overlay" id="expenseOverlay" onclick="hideExpense()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="expenseSheetTitle">Thêm chi phí</div>
    <div class="field">
      <label>Tên chi phí</label>
      <input type="text" id="expName" placeholder="VD: Tiền mặt bằng, Điện nước...">
    </div>
    <div class="field">
      <label>Danh mục</label>
      <select id="expCat">
        <option value="van_hanh">Vận hành (Mặt bằng, Điện...)</option>
        <option value="nhan_su">Nhân sự (Lương, Thưởng)</option>
        <option value="khac">Khác</option>
      </select>
    </div>
    <div class="field">
      <label>Chu kỳ</label>
      <select id="expType">
        <option value="once">Phát sinh 1 lần</option>
        <option value="daily">Cố định hàng ngày</option>
        <option value="weekly">Cố định hàng tuần</option>
        <option value="monthly">Cố định hàng tháng</option>
      </select>
    </div>
    <div class="field">
      <label>Số tiền (₫)</label>
      <input type="number" id="expAmount" placeholder="0">
    </div>
    <div class="field" id="expDateField">
      <label>Ngày bắt đầu / Ngày chi</label>
      <input type="date" id="expDate">
    </div>
    <button class="sheet-btn primary" onclick="saveExpense()">Lưu chi phí</button>
    <button class="sheet-btn danger"  id="deleteExpBtn" style="display:none" onclick="deleteExpense()">Xoá</button>
    <button class="sheet-btn secondary" onclick="hideExpense()">Huỷ</button>
  </div>
</div>

<div class="overlay" id="capitalOverlay" onclick="hideCapital()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Quản lý dòng vốn</div>
    <div class="field">
      <label>Loại giao dịch</label>
      <select id="capType">
        <option value="in">Góp vốn / Nạp tiền</option>
        <option value="out">Rút vốn / Lấy lãi</option>
      </select>
    </div>
    <div class="field">
      <label>Số tiền (₫)</label>
      <input type="number" id="capAmount" placeholder="0">
    </div>
    <div class="field">
      <label>Ghi chú</label>
      <input type="text" id="capNote" placeholder="VD: Vốn ban đầu, Rút lãi T4...">
    </div>
    <div class="field">
      <label>Ngày thực hiện</label>
      <input type="date" id="capDate">
    </div>
    <button class="sheet-btn primary" onclick="saveCapital()">Lưu giao dịch</button>
    <button class="sheet-btn secondary" onclick="hideCapital()">Huỷ</button>
  </div>
</div>

<div class="overlay" id="assetOverlay" onclick="hideAsset()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Mua Tài sản cố định</div>
    <div class="sheet-sub">Giá trị tài sản sẽ được khấu hao dần vào chi phí</div>
    <div class="field">
      <label>Tên tài sản</label>
      <input type="text" id="assetName" placeholder="VD: Xe cà phê, Máy pha...">
    </div>
    <div class="field">
      <label>Giá trị mua (₫)</label>
      <input type="number" id="assetAmount" placeholder="0">
    </div>
    <div class="field">
      <label>Thời gian khấu hao (Tháng)</label>
      <input type="number" id="assetMonths" placeholder="VD: 12">
    </div>
    <div class="field">
      <label>Ngày mua</label>
      <input type="date" id="assetDate">
    </div>
    <button class="sheet-btn primary" onclick="saveAsset()">Lưu tài sản</button>
    <button class="sheet-btn secondary" onclick="hideAsset()">Huỷ</button>
  </div>
</div>

<div class="overlay" id="cogOverlay" onclick="hideCog()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Giá vốn nguyên liệu</div>
    <div class="sheet-sub" id="cogSubtitle"></div>
    <div class="field">
      <label>Giá nhập lần này (₫ / đơn vị)</label>
      <input type="number" id="cogPrice" placeholder="0">
    </div>
    <div class="field">
      <label>Số lượng nhập</label>
      <input type="number" id="cogQty" placeholder="0">
    </div>
    <div id="cogCurrentInfo" style="font-size:13px;color:#888;background:#f5f5f0;border-radius:10px;padding:10px 14px"></div>
    <button class="sheet-btn primary" onclick="saveCog()">Cập nhật</button>
    <button class="sheet-btn secondary" onclick="hideCog()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../auth/auth.js"></script>
<script>
  Auth.require('finance');

  // ══════════════════════════════════════════
  // MASTER DATA
  // ══════════════════════════════════════════
  const RAW_ITEMS = [
    {id:'ca_phe_bot', name:'Cà phê bột', icon:'☕', unit:'g'},
    {id:'cacao_bot',  name:'Cacao bột',   icon:'🍫', unit:'g'},
    {id:'matcha_bot', name:'Matcha bột',  icon:'🍵', unit:'g'},
    {id:'bot_kem_muoi',name:'Bột kem muối',icon:'🧂', unit:'g'},
    {id:'sua_dac',    name:'Sữa đặc',     icon:'🥛', unit:'g'},
    {id:'sua_tuoi',   name:'Sữa tươi',    icon:'🍼', unit:'ml'},
    {id:'duong',      name:'Đường',        icon:'🍬', unit:'g'},
    {id:'nuoc',       name:'Nước',         icon:'💧', unit:'ml'},
  ];

  const SEMI_RECIPES = [
    {id:'cot_ca_phe',  yields:500,  recipe:[{id:'ca_phe_bot',amount:200},{id:'nuoc',amount:650}]},
    {id:'cot_cacao',   yields:1000, recipe:[{id:'cacao_bot',amount:200},{id:'nuoc',amount:1000}]},
    {id:'cot_matcha',  yields:1000, recipe:[{id:'matcha_bot',amount:100},{id:'nuoc',amount:1000}]},
    {id:'kem_muoi',    yields:300,  recipe:[{id:'bot_kem_muoi',amount:100},{id:'sua_tuoi',amount:200}]},
    {id:'nuoc_duong',  yields:1000, recipe:[{id:'duong',amount:600},{id:'nuoc',amount:1000}]},
  ];

  const MENU = [
    {id:1, name:'Cà phê đen',      price:18000, ingredients:[{id:'cot_ca_phe',amount:60},{id:'nuoc_duong',amount:20}]},
    {id:2, name:'Cà phê sữa',      price:20000, ingredients:[{id:'cot_ca_phe',amount:50},{id:'sua_dac',amount:20}]},
    {id:3, name:'Cà phê sữa tươi', price:22000, ingredients:[{id:'cot_ca_phe',amount:30},{id:'sua_dac',amount:30},{id:'sua_tuoi',amount:70}]},
    {id:4, name:'Cà phê kem muối', price:24000, ingredients:[{id:'cot_ca_phe',amount:50},{id:'sua_dac',amount:20},{id:'kem_muoi',amount:30}]},
    {id:5, name:'Matcha latte',    price:23000, ingredients:[{id:'cot_matcha',amount:40},{id:'sua_dac',amount:30},{id:'sua_tuoi',amount:70}]},
    {id:6, name:'Cacao latte',     price:23000, ingredients:[{id:'cot_cacao',amount:40},{id:'sua_dac',amount:30},{id:'sua_tuoi',amount:70}]},
  ];

  const CAT_COLORS = { van_hanh:'#378ADD', nhan_su:'#7F77DD', khau_hao:'#BA7517', khac:'#888' };
  const CAT_NAMES  = { van_hanh:'Vận hành', nhan_su:'Nhân sự', khau_hao:'Khấu hao', khac:'Khác' };
  const TYPE_NAMES = { daily:'Hàng ngày', weekly:'Hàng tuần', monthly:'Hàng tháng', once:'Một lần' };

  const fmt    = n => n.toLocaleString('vi-VN') + ' ₫';
  const toDateInput = d => { const dd=new Date(d); return `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`; };

  // ══════════════════════════════════════════
  // STATE & STORAGE
  // ══════════════════════════════════════════
  let period = 'month', cursor = new Date(), activeTab = 1;
  let customFrom = null, customTo = null;
  let editingExpId = null, cogItemId = null;
  cursor.setHours(0,0,0,0);

  const getOrders    = () => JSON.parse(localStorage.getItem('fnb_orders')     || '[]');
  const getExpenses  = () => JSON.parse(localStorage.getItem('fnb_expenses')  || '[]');
  const setExpenses  = d => localStorage.setItem('fnb_expenses',  JSON.stringify(d));
  const getCogPrices = () => JSON.parse(localStorage.getItem('fnb_cog_prices') || '{}');
  const setCogPrices = d => localStorage.setItem('fnb_cog_prices', JSON.stringify(d));
  
  // Storage mới cho Balance Sheet
  const getCapitals  = () => JSON.parse(localStorage.getItem('fnb_capitals')  || '[]');
  const setCapitals  = d => localStorage.setItem('fnb_capitals',  JSON.stringify(d));
  const getAssets    = () => JSON.parse(localStorage.getItem('fnb_assets')    || '[]');
  const setAssets    = d => localStorage.setItem('fnb_assets',    JSON.stringify(d));

  // ══════════════════════════════════════════
  // PERIOD LOGIC
  // ══════════════════════════════════════════
  function getRange(){
    const d = new Date(cursor);
    let from, to;
    if(period==='day'){
      from=new Date(d); from.setHours(0,0,0,0);
      to=new Date(d);   to.setHours(23,59,59,999);
    } else if(period==='week'){
      const day=d.getDay(), diff=day===0?-6:1-day;
      from=new Date(d); from.setDate(d.getDate()+diff); from.setHours(0,0,0,0);
      to=new Date(from); to.setDate(from.getDate()+6); to.setHours(23,59,59,999);
    } else if(period==='month'){
      from=new Date(d.getFullYear(),d.getMonth(),1);
      to=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999);
    } else if(period==='year'){
      from=new Date(d.getFullYear(),0,1);
      to=new Date(d.getFullYear(),11,31,23,59,59,999);
    } else {
      from=customFrom||new Date(d); from.setHours(0,0,0,0);
      to=customTo||new Date(d);     to.setHours(23,59,59,999);
    }
    return {from,to};
  }

  function setPeriod(p){
    period=p;
    ['day','week','month','year','custom'].forEach(x=> document.getElementById('p-'+x).classList.toggle('active',x===p));
    document.getElementById('dateNav').style.display = p==='custom'?'none':'flex';
    cursor=new Date(); cursor.setHours(0,0,0,0);
    render();
  }

  function shiftPeriod(dir){
    if(period==='day')        cursor.setDate(cursor.getDate()+dir);
    else if(period==='week')  cursor.setDate(cursor.getDate()+dir*7);
    else if(period==='month') cursor.setMonth(cursor.getMonth()+dir);
    else if(period==='year')  cursor.setFullYear(cursor.getFullYear()+dir);
    render();
  }
  function goToday(){ cursor=new Date(); cursor.setHours(0,0,0,0); render(); }

  function switchTab(n){
    activeTab=n;
    [1,2,3,4].forEach(i=>document.getElementById('tab'+i).classList.toggle('active',i===n));
    render();
  }

  // ══════════════════════════════════════════
  // CORE CALCULATIONS
  // ══════════════════════════════════════════
  function calcRevenue(orders){ return orders.reduce((s,o)=>s+o.total,0); }

  function calcCOGS(orders){
    const prices = getCogPrices();
    let total = 0;
    orders.forEach(o=>{
      (o.items||[]).forEach(item=>{
        const menuItem = MENU.find(m=>m.id===item.id);
        if(!menuItem) return;
        let costPerUnit = 0;
        menuItem.ingredients.forEach(ing=>{
          const semi = SEMI_RECIPES.find(s=>s.id===ing.id);
          if(semi){
            semi.recipe.forEach(r=>{
              const rawPrice = prices[r.id]?.avgCost || 0;
              costPerUnit += rawPrice * (r.amount / semi.yields) * ing.amount;
            });
          } else {
            const rawPrice = prices[ing.id]?.avgCost || 0;
            costPerUnit += rawPrice * ing.amount;
          }
        });
        total += costPerUnit * item.qty;
      });
    });
    return Math.round(total);
  }

  // Tính chi phí Vận hành + Khấu hao tài sản
  function calcExpenses(from, to){
    const expenses = getExpenses();
    const assets = getAssets();
    const days = Math.max(1, Math.round((to-from)/(1000*60*60*24))+1);
    
    let totalOpex = 0;
    expenses.forEach(e=>{
      if(e.type==='daily') totalOpex += e.amount * days;
      else if(e.type==='monthly') totalOpex += e.amount * Math.ceil(days/30);
      else if(e.type==='yearly') totalOpex += e.amount * Math.ceil(days/365);
    });
    
    let totalDepreciation = 0;
    assets.forEach(a=>{
      const depRate = a.life > 0 ? (a.cost / a.life) : 0;
      totalDepreciation += depRate * (days / 365);
    });
    
    return Math.round(totalOpex + totalDepreciation);
  }
