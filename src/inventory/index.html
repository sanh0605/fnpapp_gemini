<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Nguyên liệu</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

    /* ── HEADER ── */
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;text-decoration:none}
    .header-title{font-size:15px;font-weight:600;color:#1a1a18}
    .header-right{display:flex;gap:8px}
    .icon-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;font-family:inherit}
    .icon-btn:active{background:#e8e6e0}

    /* ── TABS ── */
    .tabs{background:#fff;display:flex;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .tab{flex:1;padding:10px 0;font-size:13px;font-weight:500;color:#888;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
    .tab.active{color:#1D9E75;border-bottom-color:#1D9E75}

    /* ── CONTENT ── */
    .content{flex:1;overflow-y:auto;padding:12px 14px 24px;display:flex;flex-direction:column;gap:8px}

    /* ── SECTION TITLE ── */
    .section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:8px 2px 4px}

    /* ── STOCK CARD ── */
    .stock-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:13px 14px;display:flex;align-items:center;gap:12px}
    .stock-card.warn{border-color:#FAC775;background:#FAEEDA20}
    .stock-card.danger{border-color:#F09595;background:#FCEBEB20}
    .stock-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .stock-info{flex:1;min-width:0}
    .stock-name{font-size:14px;font-weight:500;color:#1a1a18}
    .stock-detail{font-size:12px;color:#888;margin-top:2px}
    .stock-amount{text-align:right;flex-shrink:0}
    .stock-num{font-size:16px;font-weight:600;color:#1a1a18}
    .stock-num.warn{color:#BA7517}
    .stock-num.danger{color:#A32D2D}
    .stock-unit{font-size:11px;color:#888}

    /* Progress bar tồn kho */
    .stock-bar{height:3px;background:#e8e6e0;border-radius:2px;margin-top:6px;overflow:hidden}
    .stock-bar-fill{height:100%;border-radius:2px;transition:width .3s}
    .stock-bar-fill.ok{background:#1D9E75}
    .stock-bar-fill.warn{background:#EF9F27}
    .stock-bar-fill.danger{background:#E24B4A}

    /* ── LY CÓ THỂ PHA ── */
    .can-make-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:13px 14px;display:flex;align-items:center;gap:12px}
    .can-make-card.zero{opacity:.5}
    .cm-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .cm-info{flex:1}
    .cm-name{font-size:14px;font-weight:500;color:#1a1a18}
    .cm-detail{font-size:12px;color:#888;margin-top:2px}
    .cm-count{font-size:20px;font-weight:700;color:#1D9E75;flex-shrink:0}
    .cm-count.zero{color:#888}
    .cm-unit{font-size:11px;color:#888;text-align:right}

    /* ── NHẬP KHO SHEET ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:85dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600;color:#1a1a18}
    .sheet-sub{font-size:13px;color:#888;margin-top:-8px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:#888;font-weight:500}
    .field input{width:100%;padding:11px 14px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:15px;color:#1a1a18;background:#f5f5f0;font-family:inherit}
    .field input:focus{outline:none;border-color:#1D9E75;background:#fff}
    .field select{width:100%;padding:11px 14px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:15px;color:#1a1a18;background:#f5f5f0;font-family:inherit}
    .field select:focus{outline:none;border-color:#1D9E75}
    .sheet-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .sheet-btn.primary{background:#1D9E75;color:#fff}
    .sheet-btn.primary:active{background:#0F6E56}
    .sheet-btn.secondary{background:#f5f5f0;color:#1a1a18;border:0.5px solid #e8e6e0}
    .sheet-btn.secondary:active{background:#e8e6e0}

    /* ── PHA BÁN THÀNH PHẨM SHEET ── */
    .brew-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #e8e6e0}
    .brew-info{flex:1}
    .brew-name{font-size:14px;font-weight:500;color:#1a1a18}
    .brew-recipe{font-size:12px;color:#888;margin-top:2px}
    .brew-btn{padding:7px 14px;border-radius:20px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit}
    .brew-btn:active{background:#9FE1CB}
    .brew-btn:disabled{opacity:.4;cursor:default}

    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:400}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="../pos/index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="header-title">Nguyên liệu</span>
  </div>
  <div class="header-right">
    <button class="icon-btn" onclick="showImport()" title="Nhập kho">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="icon-btn" onclick="showBrew()" title="Pha bán thành phẩm">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab1" onclick="switchTab(1)">Nguyên liệu thô</button>
  <button class="tab" id="tab2" onclick="switchTab(2)">Bán thành phẩm</button>
  <button class="tab" id="tab3" onclick="switchTab(3)">Ly có thể pha</button>
</div>

<div class="content" id="content"></div>

<!-- Nhập kho overlay -->
<div class="overlay" id="importOverlay" onclick="hideImport()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Nhập kho</div>
    <div class="sheet-sub">Cập nhật tồn kho nguyên liệu thô</div>
    <div class="field">
      <label>Nguyên liệu</label>
      <select id="importItem"></select>
    </div>
    <div class="field">
      <label>Số lượng nhập thêm</label>
      <input type="number" id="importAmount" placeholder="Nhập số lượng" min="0" step="any">
    </div>
    <div id="importCurrentInfo" style="font-size:13px;color:#888;background:#f5f5f0;border-radius:10px;padding:10px 14px"></div>
    <button class="sheet-btn primary" onclick="doImport()">Cập nhật tồn kho</button>
    <button class="sheet-btn secondary" onclick="hideImport()">Huỷ</button>
  </div>
</div>

<!-- Pha bán thành phẩm overlay -->
<div class="overlay" id="brewOverlay" onclick="hideBrew()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Pha bán thành phẩm</div>
    <div class="sheet-sub">Chọn loại để pha — hệ thống tự trừ nguyên liệu thô</div>
    <div id="brewList"></div>
    <button class="sheet-btn secondary" onclick="hideBrew()">Đóng</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../auth/auth.js"></script>
<script>
  Auth.require('inventory_view');

  // ══════════════════════════════════════════
  // DỮ LIỆU HỆ THỐNG
  // ══════════════════════════════════════════

  // Nguyên liệu thô
  const RAW = [
    { id:'ca_phe_bot',    name:'Cà phê bột',    icon:'☕', unit:'g',  warnAt:300,  bg:'#FAEEDA' },
    { id:'cacao_bot',     name:'Cacao bột',      icon:'🍫', unit:'g',  warnAt:200,  bg:'#BA751730' },
    { id:'matcha_bot',    name:'Matcha bột',     icon:'🍵', unit:'g',  warnAt:100,  bg:'#C0DD9740' },
    { id:'bot_kem_muoi',  name:'Bột kem muối',   icon:'🧂', unit:'g',  warnAt:100,  bg:'#B5D4F440' },
    { id:'sua_dac',       name:'Sữa đặc',        icon:'🥛', unit:'g',  warnAt:300,  bg:'#FAC77540' },
    { id:'sua_tuoi',      name:'Sữa tươi',       icon:'🍼', unit:'ml', warnAt:500,  bg:'#E6F1FB' },
    { id:'duong',         name:'Đường',           icon:'🍬', unit:'g',  warnAt:500,  bg:'#FAEEDA' },
    { id:'nuoc',          name:'Nước',            icon:'💧', unit:'ml', warnAt:2000, bg:'#E6F1FB' },
  ];

  // Bán thành phẩm
  const SEMI = [
    {
      id:'cot_ca_phe', name:'Cốt cà phê', icon:'☕', unit:'ml', warnAt:200, bg:'#FAEEDA',
      recipe: [
        { id:'ca_phe_bot', amount:200, unit:'g'  },
        { id:'nuoc',       amount:650, unit:'ml' },
      ],
      yields: 500,
    },
    {
      id:'cot_cacao', name:'Cốt cacao', icon:'🍫', unit:'ml', warnAt:200, bg:'#BA751730',
      recipe: [
        { id:'cacao_bot', amount:200,  unit:'g'  },
        { id:'nuoc',      amount:1000, unit:'ml' },
      ],
      yields: 1000,
    },
    {
      id:'cot_matcha', name:'Cốt matcha', icon:'🍵', unit:'ml', warnAt:200, bg:'#C0DD9740',
      recipe: [
        { id:'matcha_bot', amount:100,  unit:'g'  },
        { id:'nuoc',       amount:1000, unit:'ml' },
      ],
      yields: 1000,
    },
    {
      id:'kem_muoi', name:'Kem muối', icon:'🧂', unit:'g', warnAt:100, bg:'#B5D4F440',
      recipe: [
        { id:'bot_kem_muoi', amount:100, unit:'g'  },
        { id:'sua_tuoi',     amount:200, unit:'ml' },
      ],
      yields: 300,
    },
    {
      id:'nuoc_duong', name:'Nước đường', icon:'🍬', unit:'ml', warnAt:100, bg:'#FAEEDA',
      recipe: [
        { id:'duong', amount:600,  unit:'g'  },
        { id:'nuoc',  amount:1000, unit:'ml' },
      ],
      yields: 1000,
    },
  ];

  // Thành phẩm (để tính ly có thể pha)
  const PRODUCTS = [
    {
      id:1, name:'Cà phê đen', icon:'☕', bg:'#FAEEDA',
      ingredients:[
        {id:'cot_ca_phe', amount:60,  unit:'ml'},
        {id:'nuoc_duong',  amount:20,  unit:'ml'},
      ]
    },
    {
      id:2, name:'Cà phê sữa', icon:'☕', bg:'#FAC77540',
      ingredients:[
        {id:'cot_ca_phe', amount:50, unit:'ml'},
        {id:'sua_dac',    amount:20, unit:'g' },
      ]
    },
    {
      id:3, name:'Cà phê sữa tươi', icon:'☕', bg:'#EF9F2730',
      ingredients:[
        {id:'cot_ca_phe', amount:30, unit:'ml'},
        {id:'sua_dac',    amount:30, unit:'g' },
        {id:'sua_tuoi',   amount:70, unit:'ml'},
      ]
    },
    {
      id:4, name:'Cà phê kem muối', icon:'☕', bg:'#B5D4F440',
      ingredients:[
        {id:'cot_ca_phe', amount:50, unit:'ml'},
        {id:'sua_dac',    amount:20, unit:'g' },
        {id:'kem_muoi',   amount:30, unit:'g' },
      ]
    },
    {
      id:5, name:'Matcha latte', icon:'🍵', bg:'#C0DD9740',
      ingredients:[
        {id:'cot_matcha', amount:40, unit:'ml'},
        {id:'sua_dac',    amount:30, unit:'g' },
        {id:'sua_tuoi',   amount:70, unit:'ml'},
      ]
    },
    {
      id:6, name:'Cacao latte', icon:'🍫', bg:'#BA751730',
      ingredients:[
        {id:'cot_cacao', amount:40, unit:'ml'},
        {id:'sua_dac',   amount:30, unit:'g' },
        {id:'sua_tuoi',  amount:70, unit:'ml'},
      ]
    },
  ];

  // ── STORAGE ──
  function getRawStock(){
    return JSON.parse(localStorage.getItem('fnb_raw_stock')||'{}');
  }
  function setRawStock(data){
    localStorage.setItem('fnb_raw_stock', JSON.stringify(data));
  }
  function getSemiStock(){
    return JSON.parse(localStorage.getItem('fnb_semi_stock')||'{}');
  }
  function setSemiStock(data){
    localStorage.setItem('fnb_semi_stock', JSON.stringify(data));
  }

  // ── TABS ──
  let activeTab = 1;
  function switchTab(n){
    activeTab = n;
    [1,2,3].forEach(i => {
      document.getElementById('tab'+i).classList.toggle('active', i===n);
    });
    renderContent();
  }

  // ── RENDER ──
  function renderContent(){
    if(activeTab===1) renderRaw();
    else if(activeTab===2) renderSemi();
    else renderCanMake();
  }

  function stockStatus(current, warnAt){
    if(current <= 0)       return 'danger';
    if(current <= warnAt)  return 'warn';
    return 'ok';
  }

  function renderRaw(){
    const stock = getRawStock();
    const el = document.getElementById('content');
    el.innerHTML = RAW.map(item => {
      const amt   = stock[item.id] || 0;
      const max   = item.warnAt * 5;
      const pct   = Math.min(100, Math.round(amt / max * 100));
      const st    = stockStatus(amt, item.warnAt);
      return `<div class="stock-card${st==='ok'?'':' '+st}">
        <div class="stock-icon" style="background:${item.bg}">${item.icon}</div>
        <div class="stock-info">
          <div class="stock-name">${item.name}</div>
          <div class="stock-bar"><div class="stock-bar-fill ${st}" style="width:${pct}%"></div></div>
          <div class="stock-detail">Cảnh báo khi dưới ${item.warnAt}${item.unit}</div>
        </div>
        <div class="stock-amount">
          <div class="stock-num${st==='ok'?'':' '+st}">${amt.toLocaleString('vi-VN')}</div>
          <div class="stock-unit">${item.unit}</div>
        </div>
      </div>`;
    }).join('');
  }

  function renderSemi(){
    const stock = getSemiStock();
    const el = document.getElementById('content');
    el.innerHTML = `<div class="section-title">Tồn kho bán thành phẩm</div>` +
    SEMI.map(item => {
      const amt = stock[item.id] || 0;
      const max = item.warnAt * 5;
      const pct = Math.min(100, Math.round(amt / max * 100));
      const st  = stockStatus(amt, item.warnAt);
      const recipeText = item.recipe.map(r => `${r.amount}${r.unit} ${RAW.find(x=>x.id===r.id)?.name||r.id}`).join(' + ');
      return `<div class="stock-card${st==='ok'?'':' '+st}">
        <div class="stock-icon" style="background:${item.bg}">${item.icon}</div>
        <div class="stock-info">
          <div class="stock-name">${item.name}</div>
          <div class="stock-bar"><div class="stock-bar-fill ${st}" style="width:${pct}%"></div></div>
          <div class="stock-detail">${recipeText} → ${item.yields}${item.unit}</div>
        </div>
        <div class="stock-amount">
          <div class="stock-num${st==='ok'?'':' '+st}">${amt.toLocaleString('vi-VN')}</div>
          <div class="stock-unit">${item.unit}</div>
        </div>
      </div>`;
    }).join('');
  }

  function renderCanMake(){
    const semiStock = getSemiStock();
    const rawStock  = getRawStock();
    const el = document.getElementById('content');

    const results = PRODUCTS.map(product => {
      const canMake = Math.floor(Math.min(...product.ingredients.map(ing => {
        // Bán thành phẩm
        const semi = SEMI.find(s => s.id === ing.id);
        if(semi) return (semiStock[ing.id] || 0) / ing.amount;
        // Nguyên liệu thô trực tiếp
        const raw = RAW.find(r => r.id === ing.id);
        if(raw)  return (rawStock[ing.id] || 0) / ing.amount;
        return 0;
      })));
      return { ...product, canMake };
    });

    el.innerHTML = `<div class="section-title">Dựa trên tồn kho hiện tại</div>` +
    results.map(p => {
      const limitingIng = p.ingredients.map(ing => {
        const semi = SEMI.find(s=>s.id===ing.id);
        const name = semi ? semi.name : RAW.find(r=>r.id===ing.id)?.name || ing.id;
        const stock = semi ? (getSemiStock()[ing.id]||0) : (getRawStock()[ing.id]||0);
        return { name, stock, unit: ing.unit };
      }).sort((a,b) => a.stock - b.stock)[0];

      return `<div class="can-make-card${p.canMake===0?' zero':''}">
        <div class="cm-icon" style="background:${p.bg}">${p.icon}</div>
        <div class="cm-info">
          <div class="cm-name">${p.name}</div>
          <div class="cm-detail">Giới hạn bởi: ${limitingIng?.name || '—'}</div>
        </div>
        <div>
          <div class="cm-count${p.canMake===0?' zero':''}">${p.canMake}</div>
          <div class="cm-unit">ly</div>
        </div>
      </div>`;
    }).join('');
  }

  // ── NHẬP KHO ──
  function showImport(){
    const stock = getRawStock();
    const sel = document.getElementById('importItem');
    sel.innerHTML = RAW.map(r =>
      `<option value="${r.id}">${r.name} (hiện tại: ${stock[r.id]||0}${r.unit})</option>`
    ).join('');
    updateImportInfo();
    sel.onchange = updateImportInfo;
    document.getElementById('importAmount').value = '';
    document.getElementById('importOverlay').classList.add('show');
  }
  function updateImportInfo(){
    const stock = getRawStock();
    const id    = document.getElementById('importItem').value;
    const item  = RAW.find(r=>r.id===id);
    if(!item) return;
    const current = stock[id]||0;
    document.getElementById('importCurrentInfo').textContent =
      `Tồn kho hiện tại: ${current}${item.unit} — Cảnh báo khi dưới ${item.warnAt}${item.unit}`;
  }
  function hideImport(){document.getElementById('importOverlay').classList.remove('show');}
  function doImport(){
    const id     = document.getElementById('importItem').value;
    const amount = parseFloat(document.getElementById('importAmount').value);
    if(!id || isNaN(amount) || amount <= 0){
      toast('Vui lòng nhập số lượng hợp lệ'); return;
    }
    const stock  = getRawStock();
    const item   = RAW.find(r=>r.id===id);
    stock[id]    = (stock[id]||0) + amount;
    setRawStock(stock);
    hideImport();
    toast(`✓ Đã nhập ${amount}${item.unit} ${item.name}`);
    renderContent();
  }

  // ── PHA BÁN THÀNH PHẨM ──
  function showBrew(){
    renderBrewList();
    document.getElementById('brewOverlay').classList.add('show');
  }
  function hideBrew(){document.getElementById('brewOverlay').classList.remove('show');}

  function renderBrewList(){
    const rawStock = getRawStock();
    document.getElementById('brewList').innerHTML = SEMI.map(item => {
      // Kiểm tra đủ nguyên liệu thô không
      const canBrew = item.recipe.every(r => (rawStock[r.id]||0) >= r.amount);
      const recipeText = item.recipe.map(r =>
        `${r.amount}${r.unit} ${RAW.find(x=>x.id===r.id)?.name||r.id}`
      ).join(' + ');
      return `<div class="brew-item">
        <div style="font-size:24px">${item.icon}</div>
        <div class="brew-info">
          <div class="brew-name">${item.name}</div>
          <div class="brew-recipe">${recipeText} → ${item.yields}${item.unit}</div>
        </div>
        <button class="brew-btn" ${canBrew?'':'disabled'} onclick="doBrew('${item.id}')">
          Pha
        </button>
      </div>`;
    }).join('');
  }

  function doBrew(semiId){
    const item     = SEMI.find(s=>s.id===semiId);
    const rawStock = getRawStock();
    const semiStock= getSemiStock();

    // Kiểm tra đủ nguyên liệu
    const enough = item.recipe.every(r => (rawStock[r.id]||0) >= r.amount);
    if(!enough){ toast('Không đủ nguyên liệu thô!'); return; }

    // Trừ nguyên liệu thô
    item.recipe.forEach(r => { rawStock[r.id] = (rawStock[r.id]||0) - r.amount; });
    setRawStock(rawStock);

    // Cộng bán thành phẩm
    semiStock[semiId] = (semiStock[semiId]||0) + item.yields;
    setSemiStock(semiStock);

    toast(`✓ Đã pha ${item.yields}${item.unit} ${item.name}`);
    renderBrewList();
    renderContent();
  }

  // ── TOAST ──
  function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.style.opacity='1';
    clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity='0',2200);
  }

  // ── INIT ──
  renderContent();
</script>
</body>
</html>
